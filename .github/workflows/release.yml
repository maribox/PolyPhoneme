name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: jetbrains
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          # Generate version code from tag: v1.2.3 → 10203
          IFS='.' read -r major minor patch <<< "$VERSION"
          CODE=$(( major * 10000 + minor * 100 + ${patch:-0} ))
          echo "name=$VERSION" >> "$GITHUB_OUTPUT"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "Building version $VERSION (code $CODE)"

      - name: Decode keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > ${{ github.workspace }}/release.keystore

      - name: Build release APK
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew :composeApp:assembleRelease \
            -PAPP_VERSION_NAME=${{ steps.version.outputs.name }} \
            -PAPP_VERSION_CODE=${{ steps.version.outputs.code }}

      - name: Find and rename APK
        id: apk
        run: |
          APK=$(find composeApp/build/outputs/apk/release -name '*.apk' | head -1)
          if [ -z "$APK" ]; then
            echo "No release APK found, falling back to debug"
            ./gradlew :composeApp:assembleDebug \
              -PAPP_VERSION_NAME=${{ steps.version.outputs.name }} \
              -PAPP_VERSION_CODE=${{ steps.version.outputs.code }}
            APK=$(find composeApp/build/outputs/apk/debug -name '*.apk' | head -1)
          fi
          DEST="polyphoneme-${{ steps.version.outputs.name }}.apk"
          cp "$APK" "$DEST"
          echo "path=$DEST" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ steps.apk.outputs.path }}
          name: PolyPhoneme ${{ steps.version.outputs.name }}
